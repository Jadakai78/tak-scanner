<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TAK Signal Feed</title>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d14;
            --surface: #111421;
            --surface-2: #161926;
            --surface-3: #1c1f2e;
            --border: rgba(255,255,255,0.07);
            --text: #e2e4ed;
            --muted: #7b7f96;
            --faint: #464a61;

            --green: #22d37a;
            --green-dim: rgba(34,211,122,0.12);
            --red: #f04f5a;
            --red-dim: rgba(240,79,90,0.13);
            --amber: #f5a623;
            --amber-dim: rgba(245,166,35,0.12);
            --blue: #5b8af0;
            --blue-dim: rgba(91,138,240,0.12);
            --purple: #9f7ced;
            --purple-dim: rgba(159,124,237,0.1);
            --teal: #2dd4cf;
            --teal-dim: rgba(45,212,207,0.1);

            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 14px;
            --font: 'Satoshi', system-ui, sans-serif;

            --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.8rem);
            --text-sm: clamp(0.8rem, 0.75rem + 0.25vw, 0.9rem);
            --text-base: clamp(0.9rem, 0.85rem + 0.25vw, 1rem);
            --text-lg: clamp(1rem, 0.9rem + 0.5vw, 1.15rem);
            --text-xl: clamp(1.1rem, 0.95rem + 0.75vw, 1.35rem);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            font-size: var(--text-base);
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        img { display: block; max-width: 100%; }
        button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(11,13,20,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: var(--text-lg);
            letter-spacing: -0.02em;
        }
        .logo svg { flex-shrink: 0; }
        .spacer { flex: 1; }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 0 rgba(34,211,122,0.6);
            animation: pulse 2s ease infinite;
        }
        .pulse-dot.offline { background: var(--red); box-shadow: 0 0 0 0 rgba(240,79,90,0.6); }
        .pulse-dot.loading { background: var(--amber); animation: blink 0.8s ease infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,211,122,0.6); } 50% { box-shadow: 0 0 0 5px rgba(34,211,122,0); } }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.15s;
        }
        .refresh-btn:active { color: var(--teal); transform: rotate(180deg); }

        .main { padding: 12px 12px 80px; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stat-label { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-val { font-size: var(--text-xl); font-weight: 700; line-height: 1; }
        .stat-val.green { color: var(--green); }
        .stat-val.red { color: var(--red); }
        .stat-val.amber { color: var(--amber); }
        .stat-val.purple { color: var(--purple); }

        .filter-bar {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 14px;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-pill {
            flex-shrink: 0;
            padding: 5px 12px;
            border-radius: var(--r-sm);
            font-size: var(--text-xs);
            font-weight: 600;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--muted);
            white-space: nowrap;
            transition: all 0.15s;
        }
        .filter-pill.active {
            background: var(--teal-dim);
            border-color: var(--teal);
            color: var(--teal);
        }

        .section-label {
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--faint);
            margin: 16px 0 8px;
        }

        .signal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 14px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .signal-card.hot { border-color: rgba(240,79,90,0.35); }
        .signal-card.hot::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(240,79,90,0.04) 0%, transparent 60%);
            pointer-events: none;
        }
        .signal-card.wait { border-color: rgba(245,166,35,0.3); }
        .signal-card.confirm { border-color: rgba(34,211,122,0.35); }
        .signal-card.confirm::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(34,211,122,0.04) 0%, transparent 60%);
            pointer-events: none;
        }
        .signal-card.expired { opacity: 0.45; }

        .card-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
        .pair-name {
            font-size: var(--text-xl);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            flex: 1;
        }
        .verdict-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: var(--r-sm);
            font-size: var(--text-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }
        .verdict-badge.PENDING { background: var(--amber-dim); color: var(--amber); }
        .verdict-badge.CONFIRM { background: var(--green-dim); color: var(--green); }
        .verdict-badge.WAIT { background: var(--blue-dim); color: var(--blue); }
        .verdict-badge.REJECT, .verdict-badge.EXPIRED { background: rgba(70,74,97,0.3); color: var(--muted); }

        .conv-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .conv-track {
            flex: 1;
            height: 5px;
            background: var(--surface-3);
            border-radius: 9999px;
            overflow: hidden;
        }
        .conv-fill {
            height: 100%;
            border-radius: 9999px;
            background: linear-gradient(90deg, var(--teal), var(--green));
            transition: width 0.4s ease;
        }
        .conv-fill.hot { background: linear-gradient(90deg, var(--amber), var(--red)); }
        .conv-pct { font-size: var(--text-sm); font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .meta-cell {
            background: var(--surface-2);
            border-radius: var(--r-sm);
            padding: 7px 9px;
        }
        .meta-key {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .meta-val { font-size: var(--text-sm); font-weight: 500; font-variant-numeric: tabular-nums; }
        .meta-val.bull { color: var(--green); }
        .meta-val.bear { color: var(--red); }
        .meta-val.warn { color: var(--amber); }
        .meta-val.info { color: var(--blue); }

        .april-block {
            margin-top: 8px;
            background: var(--purple-dim);
            border: 1px solid rgba(159,124,237,0.2);
            border-radius: var(--r-sm);
            padding: 8px 10px;
            font-size: var(--text-xs);
            color: var(--purple);
        }
        .april-label { font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }

        .ts { font-size: var(--text-xs); color: var(--faint); margin-top: 8px; font-variant-numeric: tabular-nums; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }
        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-title { font-size: var(--text-lg); font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .empty-body { font-size: var(--text-sm); max-width: 30ch; line-height: 1.5; }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skel {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-3) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: var(--r-lg);
        }
        .skel-card { height: 140px; margin-bottom: 10px; }

        .fab {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            right: 18px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            z-index: 30;
            background: var(--teal);
            color: #0b0d14;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(45,212,207,0.35);
            font-size: 1.3rem;
            font-weight: 700;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .fab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(45,212,207,0.2); }
        .fab.spinning svg { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 6px 14px calc(6px + env(safe-area-inset-bottom));
            background: rgba(11,13,20,0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: var(--text-xs);
            color: var(--faint);
        }
        .countdown { font-variant-numeric: tabular-nums; color: var(--muted); }

        .scan-strip {
            display: none;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 9px 12px;
            margin-bottom: 14px;
            font-size: var(--text-xs);
        }
        .scan-key { color: var(--muted); }
        .scan-val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
        .scan-sep { color: var(--faint); }
    </style>
</head>
<body>
<div class="topbar">
    <div class="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-label="TAK Scanner">
            <polygon points="11,2 20,18 2,18" fill="none" stroke="#2dd4cf" stroke-width="1.8" stroke-linejoin="round"/>
            <circle cx="11" cy="13" r="2.2" fill="#2dd4cf"/>
            <line x1="11" y1="7" x2="11" y2="11" stroke="#2dd4cf" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        TAK Feed
    </div>
    <div class="spacer"></div>
    <div id="pulse" class="pulse-dot loading"></div>
    <button class="refresh-btn" onclick="loadSignals(true)" aria-label="Refresh signals">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
    </button>
</div>

<div class="main">
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Bots</div>
            <div class="stat-val" id="cnt-bots">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Traps</div>
            <div class="stat-val amber" id="cnt-traps">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Gimbas</div>
            <div class="stat-val purple" id="cnt-gimbas">—</div>
        </div>
    </div>

    <div class="scan-strip" id="scan-strip">
        <span class="scan-key">Last scan</span>
        <span class="scan-val" id="scan-time">—</span>
        <span class="scan-sep">·</span>
        <span class="scan-key">Regime</span>
        <span class="scan-val" id="scan-regime">—</span>
        <span class="scan-sep">·</span>
        <span class="scan-key">FG</span>
        <span class="scan-val" id="scan-fg">—</span>
    </div>

    <div class="filter-bar" id="filter-bar">
        <button class="filter-pill active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-pill" data-filter="hot" onclick="setFilter('hot',this)">🔥 Hot 75%+</button>
        <button class="filter-pill" data-filter="CONFIRM" onclick="setFilter('CONFIRM',this)">✅ Confirm</button>
        <button class="filter-pill" data-filter="PENDING" onclick="setFilter('PENDING',this)">⏳ Pending</button>
        <button class="filter-pill" data-filter="WAIT" onclick="setFilter('WAIT',this)">👁 Wait</button>
        <button class="filter-pill" data-filter="LONG" onclick="setFilter('LONG',this)">📈 Long</button>
        <button class="filter-pill" data-filter="SHORT" onclick="setFilter('SHORT',this)">📉 Short</button>
    </div>

    <div id="signals-container">
        <div class="skel skel-card"></div>
        <div class="skel skel-card" style="opacity:0.6"></div>
        <div class="skel skel-card" style="opacity:0.3"></div>
    </div>
</div>

<div class="footer-bar">
    <span>Next refresh in</span>
    <span class="countdown" id="countdown">60s</span>
    <div class="spacer"></div>
    <span id="last-updated" style="color:var(--muted)">—</span>
</div>

<button class="fab" id="fab" onclick="loadSignals(true)" aria-label="Refresh">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
</button>

<script>
const API = 'https://giving-wisdom-production-9b27.up.railway.app/api/signals';
const REFRESH_SEC = 60;
let allSignals = [];
let allRtsSignals = [];
let currentFilter = 'all';

const BOT_ENGINES   = new Set(['S1','S2','S4','S5','S6','S7','S8','S9']);
const GIMBA_ENGINES = new Set(['S3','S10']);
let countdownVal = REFRESH_SEC;
let refreshTimer;
let countdownTimer;

function conv(sig) {
    const raw = sig.conviction ?? sig.final_conviction ?? 0;
    return raw <= 1.0 ? raw * 100 : raw;
}

function fmtTime(v) {
    if (!v) return '—';
    try {
        const d = typeof v === 'number' ? new Date(v * 1000) : new Date(v);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch {
        return String(v).slice(0, 16);
    }
}

function fmtRelative(v) {
    if (!v) return '';
    try {
        const d = typeof v === 'number' ? new Date(v * 1000) : new Date(v);
        const diff = Math.floor((Date.now() - d) / 1000);
        if (diff < 60) return diff + 's ago';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        return Math.floor(diff / 3600) + 'h ago';
    } catch {
        return '';
    }
}

function verdictClass(verdict) {
    if (!verdict) return 'PENDING';
    return verdict.toUpperCase().trim();
}

function biasClass(bias) {
    if (!bias) return '';
    const b = bias.toUpperCase();
    if (b === 'LONG' || b === 'BUY' || b === 'BULLISH') return 'bull';
    if (b === 'SHORT' || b === 'SELL' || b === 'BEARISH') return 'bear';
    return '';
}

function trapClass(t) {
    if (!t && t !== 0) return '';
    const v = parseFloat(t);
    if (Number.isNaN(v)) return '';
    if (v >= 0.6) return 'warn';
    if (v >= 0.4) return 'info';
    return '';
}

function fmtPrice(v) {
    const n = parseFloat(v);
    if (Number.isNaN(n)) return '—';
    return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function fmtTrap(v) {
    const n = parseFloat(v);
    if (Number.isNaN(n)) return '—';
    return (n * 100).toFixed(0) + '%';
}

function getEngineName(sig) {
    return (sig.engine ?? sig.strategy ?? sig.specialist ?? '').toUpperCase().trim();
}

function matchesBiasFilter(sig, filter) {
    const b = (sig.bias || '').toUpperCase();
    if (filter === 'LONG') return b === 'LONG' || b === 'BUY' || b === 'BULLISH';
    return b === 'SHORT' || b === 'SELL' || b === 'BEARISH';
}

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-pill').forEach((p) => p.classList.remove('active'));
    btn.classList.add('active');
    renderSignals(allSignals, allRtsSignals);
}

function applyFilter(sigs) {
    if (currentFilter === 'all') return sigs;
    if (currentFilter === 'hot') return sigs.filter((s) => conv(s) >= 75);
    if (['CONFIRM', 'PENDING', 'WAIT', 'REJECT', 'EXPIRED'].includes(currentFilter)) {
        return sigs.filter((s) => (s.december_verdict || 'PENDING').toUpperCase() === currentFilter);
    }
    if (['LONG', 'SHORT'].includes(currentFilter)) {
        return sigs.filter((s) => matchesBiasFilter(s, currentFilter));
    }
    return sigs;
}

function applyFilterRts(sigs) {
    if (currentFilter === 'all') return sigs;
    if (currentFilter === 'hot') return sigs.filter((s) => conv(s) >= 75);
    if (['LONG', 'SHORT'].includes(currentFilter)) {
        return sigs.filter((s) => matchesBiasFilter(s, currentFilter));
    }
    // CONFIRM/PENDING/WAIT filters pass through all RTS signals (they use different verdict fields)
    return sigs;
}

function renderCard(sig) {
    const c = conv(sig);
    const verdict = verdictClass(sig.december_verdict);
    const isHot = c >= 75;
    const cardClass = verdict === 'CONFIRM' ? 'confirm' : verdict === 'WAIT' ? 'wait' : isHot ? 'hot' : '';
    const expired = verdict === 'EXPIRED' || verdict === 'REJECT';
    const convFillClass = isHot ? 'hot' : '';

    const entry = sig.entry_price ?? sig.entry ?? null;
    const tp = sig.take_profit ?? sig.tp ?? null;
    const sl = sig.stop_loss ?? sig.sl ?? null;
    const trap = sig.trap_risk ?? sig.trap_score ?? null;
    const engine = sig.engine ?? sig.strategy ?? sig.specialist ?? null;
    const bias = sig.bias ?? null;
    const april = sig.april_view ?? sig.april ?? null;
    const ts = sig.fired_at ?? sig.timestamp ?? null;

    const metaCells = [];
    metaCells.push(`<div class="meta-cell"><div class="meta-key">Bias</div><div class="meta-val ${biasClass(bias)}">${bias || '—'}</div></div>`);
    metaCells.push(`<div class="meta-cell"><div class="meta-key">Engine</div><div class="meta-val">${engine || '—'}</div></div>`);
    if (entry !== null) metaCells.push(`<div class="meta-cell"><div class="meta-key">Entry</div><div class="meta-val">${fmtPrice(entry)}</div></div>`);
    if (tp !== null) metaCells.push(`<div class="meta-cell"><div class="meta-key">TP</div><div class="meta-val bull">${fmtPrice(tp)}</div></div>`);
    if (sl !== null) metaCells.push(`<div class="meta-cell"><div class="meta-key">SL</div><div class="meta-val bear">${fmtPrice(sl)}</div></div>`);
    if (trap !== null) metaCells.push(`<div class="meta-cell"><div class="meta-key">Trap Risk</div><div class="meta-val ${trapClass(trap)}">${fmtTrap(trap)}</div></div>`);

    return `<div class="signal-card ${cardClass} ${expired ? 'expired' : ''}">
        <div class="card-head">
            <div class="pair-name">${sig.pair || '?'}</div>
            <div class="verdict-badge ${verdict}">${verdict}</div>
        </div>
        <div class="conv-row">
            <div class="conv-track"><div class="conv-fill ${convFillClass}" style="width:${Math.min(c, 100)}%"></div></div>
            <span class="conv-pct">${c.toFixed(0)}%</span>
        </div>
        <div class="meta-grid">${metaCells.join('')}</div>
        ${april ? `<div class="april-block"><div class="april-label">April View</div>${april}</div>` : ''}
        <div class="ts">${fmtTime(ts)} · ${fmtRelative(ts)}</div>
    </div>`;
}

function renderSignals(sigs, rtsSigs) {
    rtsSigs = rtsSigs || [];
    const container = document.getElementById('signals-container');

    // Categorise bot/gimba signals from the signals array
    const botSigs   = sigs.filter((s) => BOT_ENGINES.has(getEngineName(s)));
    const gimbaSigs = sigs.filter((s) => GIMBA_ENGINES.has(getEngineName(s)));

    // Update section counts (always unfiltered)
    document.getElementById('cnt-bots').textContent   = botSigs.length;
    document.getElementById('cnt-traps').textContent  = rtsSigs.length;
    document.getElementById('cnt-gimbas').textContent = gimbaSigs.length;

    // Apply the current filter to each group
    const filteredBots   = applyFilter(botSigs);
    const filteredTraps  = applyFilterRts(rtsSigs);
    const filteredGimbas = applyFilter(gimbaSigs);

    if (filteredBots.length === 0 && filteredTraps.length === 0 && filteredGimbas.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-title">No signals${currentFilter !== 'all' ? ' for this filter' : ''}</div><div class="empty-body">No live signals matched the current view.</div></div>`;
        return;
    }

    function sortByConviction(arr) {
        return [...arr].sort((a, b) => {
            const va = a.december_verdict || 'PENDING';
            const vb = b.december_verdict || 'PENDING';
            const order = { CONFIRM: 0, PENDING: 1, WAIT: 2, EXPIRED: 3, REJECT: 4 };
            const oa = order[va.toUpperCase()] ?? 5;
            const ob = order[vb.toUpperCase()] ?? 5;
            if (oa !== ob) return oa - ob;
            return conv(b) - conv(a);
        });
    }

    let html = '';

    if (filteredBots.length > 0) {
        html += `<div class="section-label">🤖 Bots (${filteredBots.length})</div>`;
        sortByConviction(filteredBots).forEach((s) => { html += renderCard(s); });
    }

    if (filteredTraps.length > 0) {
        html += `<div class="section-label">⚡ Traps (${filteredTraps.length})</div>`;
        filteredTraps.forEach((s) => { html += renderCard(s); });
    }

    if (filteredGimbas.length > 0) {
        html += `<div class="section-label">🔮 Gimbas (${filteredGimbas.length})</div>`;
        sortByConviction(filteredGimbas).forEach((s) => { html += renderCard(s); });
    }

    container.innerHTML = html;
}

async function loadSignals(manual = false) {
    const pulse = document.getElementById('pulse');
    const fab = document.getElementById('fab');
    pulse.className = 'pulse-dot loading';
    fab.classList.add('spinning');

    try {
        const res = await fetch(API + '?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const sigs = data.signals ?? data ?? [];
        allSignals = Array.isArray(sigs) ? sigs : [];
        const rts = data.rts_signals ?? [];
        allRtsSignals = Array.isArray(rts) ? rts : [];

        const lastscan = data.lastscan ?? data.last_scan ?? (data.tak && data.tak.lastscan);
        const regime = data.regime ?? (data.tak && data.tak.regime);
        const fg = data.fear_greed ?? data.fg ?? (data.tak && data.tak.fear_greed);
        const strip = document.getElementById('scan-strip');

        if (lastscan || regime || fg !== undefined) {
            strip.style.display = 'flex';
            document.getElementById('scan-time').textContent = lastscan ? fmtTime(lastscan) : '—';
            document.getElementById('scan-regime').textContent = regime || '—';
            document.getElementById('scan-fg').textContent = fg !== undefined ? fg : '—';
        } else {
            strip.style.display = 'none';
        }

        renderSignals(allSignals, allRtsSignals);
        pulse.className = 'pulse-dot';
        document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        resetCountdown();
    } catch (e) {
        console.error('loadSignals failed:', e);
        pulse.className = 'pulse-dot offline';
        if (allSignals.length === 0) {
            document.getElementById('signals-container').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Connection error</div><div class="empty-body">Could not load live signals. Check the API endpoint, CORS, and browser console for details.</div></div>`;
        }
        document.getElementById('last-updated').textContent = manual ? '⚠ Manual refresh failed' : '⚠ Connection failed';
    } finally {
        fab.classList.remove('spinning');
    }
}

function resetCountdown() {
    clearInterval(countdownTimer);
    clearTimeout(refreshTimer);
    countdownVal = REFRESH_SEC;
    document.getElementById('countdown').textContent = countdownVal + 's';
    countdownTimer = setInterval(() => {
        countdownVal -= 1;
        document.getElementById('countdown').textContent = countdownVal + 's';
        if (countdownVal <= 0) clearInterval(countdownTimer);
    }, 1000);
    refreshTimer = setTimeout(() => loadSignals(), REFRESH_SEC * 1000);
}

loadSignals();
</script>
