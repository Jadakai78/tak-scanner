<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0f1115"/>
<title>JHL Live Terminal</title>
<style>
:root{--bg:#111317;--surface:#171a1f;--surface2:#1d2128;--surface3:#262c36;--line:#313846;--text:#e6e9ee;--muted:#9aa3b2;--faint:#667080;--primary:#5db1b5;--success:#5fc084;--warning:#e0a84b;--danger:#ef7373;--gold:#f0c25b}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
button,input{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{max-width:960px;margin:0 auto;padding:16px}
/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#114c4f);display:grid;place-items:center;flex-shrink:0}
.logo svg{width:20px;height:20px;color:#fff}
h1{font-size:1.15rem;font-weight:800;letter-spacing:-.02em}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:.82rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0}
.dot.live{background:var(--success);box-shadow:0 0 8px color-mix(in srgb,var(--success) 60%,transparent)}
.dot.stale{background:var(--warning)}
.dot.offline{background:var(--danger)}
/* status bar */
.status-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px}
.stat .lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.stat .val{font-size:1.3rem;font-weight:800}
/* sections */
.section{background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
.sec-hdr:hover{background:var(--surface2)}
.sec-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px}
.sec-title .cnt{padding:2px 8px;border-radius:999px;background:var(--surface3);font-size:.75rem;color:var(--text)}
.chevron{color:var(--faint);font-size:.85rem;transition:.2s}
.chevron.open{transform:rotate(180deg)}
.sec-body{padding:14px;display:grid;gap:10px}
.sec-body.hidden{display:none}
/* signal card */
.sig{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:14px}
.sig-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sig-top h3{font-size:1rem;font-weight:700}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tag{padding:3px 8px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:.74rem;color:var(--muted)}
.tag.long{color:var(--success);border-color:color-mix(in srgb,var(--success) 40%,var(--line))}
.tag.short{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 40%,var(--line))}
.tag.gold{color:var(--gold)}
.tag.live{color:var(--success);border-color:var(--success)}
.tag.wait{color:#a78bfa;border-color:#a78bfa}
.tag.reject{color:var(--danger)}
.levels{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.lvl{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px}
.lvl .k{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.lvl .v{font-weight:700;margin-top:3px;font-size:.9rem}
.btns{display:flex;gap:8px;margin-top:10px}
.btn{flex:1;padding:9px 10px;border-radius:10px;border:1px solid var(--line);font-size:.82rem;font-weight:600;background:var(--surface);transition:.15s}
.btn:hover{opacity:.85}
.btn.exec{background:color-mix(in srgb,var(--success) 12%,transparent);border-color:var(--success);color:var(--success)}
.btn.wait{background:color-mix(in srgb,#a78bfa 10%,transparent);border-color:#a78bfa;color:#a78bfa}
.btn.rej{background:color-mix(in srgb,var(--danger) 10%,transparent);border-color:var(--danger);color:var(--danger)}
/* rts card */
.rts-sig{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:14px}
.rts-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.trap-score{font-size:1.1rem;font-weight:800}
/* gimba card */
.gimba-sig{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:14px}
.mode-badge{padding:4px 10px;border-radius:999px;font-size:.8rem;font-weight:700;border:1px solid}
.empty{padding:14px;border-radius:12px;background:var(--surface2);border:1px dashed var(--line);color:var(--muted);font-size:.88rem;text-align:center}
@media(max-width:600px){.status-bar{grid-template-columns:repeat(2,1fr)}.levels{grid-template-columns:repeat(2,1fr)}.btns{flex-direction:column}}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div>
        <h1>JHL Live Terminal</h1>
        <div style="font-size:.8rem;color:var(--muted)">Signal Feed · Auto-refresh 15s</div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="pill"><span class="dot" id="connDot"></span><span id="connText">connecting…</span></span>
      <span class="pill" style="color:var(--gold)">F&amp;G <strong id="fgScore">—</strong> <span id="fgLabel" style="color:var(--muted)"></span></span>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="stat"><div class="lbl">Last Scan</div><div class="val" id="statScan">—</div></div>
    <div class="stat"><div class="lbl">Signals</div><div class="val" id="statSigs">0</div></div>
    <div class="stat"><div class="lbl">RTS Traps</div><div class="val" id="statRts">0</div></div>
    <div class="stat"><div class="lbl">April Mode</div><div class="val" id="statMode" style="font-size:.95rem">—</div></div>
  </div>

  <!-- Section 1: Regular Bot Signals -->
  <div class="section">
    <div class="sec-hdr" onclick="toggleSection('bots')">
      <div class="sec-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">ircle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Regular Bot Signals
        <span class="cnt" id="botsCount">0</span>
      </div>
      <span class="chevron open" id="botsChev">▾</span>
    </div>
    <div class="sec-body" id="botsBody"></div>
  </div>

  <!-- Section 2: RTS Traps -->
  <div class="section">
    <div class="sec-hdr" onclick="toggleSection('rts')">
      <div class="sec-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>e x1="12" y1="9" x2="12" y2="13"/>e x1="12" y1="17" x2="12.01" y2="17"/></svg>
        RTS Traps
        <span class="cnt" id="rtsCount">0</span>
      </div>
      <span class="chevron open" id="rtsChev">▾</span>
    </div>
    <div class="sec-body" id="rtsBody"></div>
  </div>

  <!-- Section 3: GIMBA Bot Signals -->
  <div class="section">
    <div class="sec-hdr" onclick="toggleSection('gimba')">
      <div class="sec-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        GIMBA Bot Signals
        <span class="cnt" id="gimbaCount">0</span>
      </div>
      <span class="chevron open" id="gimbaChev">▾</span>
    </div>
    <div class="sec-body" id="gimbaBody"></div>
  </div>

</div>
<script type="module">
import { createCanonicalSnapshot } from './jhl-snapshot-adapter.module.js';

const sf = v => { const f = parseFloat(v); return isNaN(f) ? 0 : f; };
const fmt = (v, d=2) => Number(v??0).toLocaleString(undefined,{maximumFractionDigits:d});
const safe = v => (v==null||v==='') ? '—' : String(v);
const arr = v => Array.isArray(v) ? v : [];

function toggleSection(id) {
  const body = document.getElementById(id+'Body');
  const chev = document.getElementById(id+'Chev');
  body.classList.toggle('hidden');
  chev.classList.toggle('open');
}

function setConn(status) {
  const dot = document.getElementById('connDot');
  dot.className = 'dot ' + (status==='live'?'live':status==='stale'?'stale':'offline');
  document.getElementById('connText').textContent = status+' snapshot';
}

function verdictTag(v) {
  if(v==='CONFIRM') return '<span class="tag live">LIVE</span>';
  if(v==='WAIT')    return '<span class="tag wait">WAIT</span>';
  if(v==='REJECT')  return '<span class="tag reject">REJECTED</span>';
  return '<span class="tag gold">PENDING</span>';
}

function sigCard(s) {
  const v = safe(s.december_verdict||'PENDING');
  const isDead = v==='REJECT'||v==='EXPIRED';
  const isLive = v==='CONFIRM';
  const isWait = v==='WAIT';
  const conv = sf(s.conviction)>1 ? sf(s.conviction) : sf(s.conviction)*100;
  const btns = !isDead ? `
    <div class="btns">
      <button class="btn exec" onclick="window._exec(${JSON.stringify(s)},this)">${isLive?'✓ LIVE':'Execute'}</button>
      ${!isLive?`<button class="btn wait" onclick="window._wait('${s.pair}',this)">${isWait?'Waiting':'Wait'}</button>`:''}
      <button class="btn rej" onclick="window._rej('${s.pair}',this)">Reject</button>
    </div>` : '';
  return `<div class="sig" style="${isDead?'opacity:.45':''}">
    <div class="sig-top">
      <div>
        <h3>${safe(s.pair)}</h3>
          <div class="tags">
            <span class="tag ${s.bias==='LONG'?'long':'short'}">${safe(s.bias)}</span>
            <span class="tag gold">Conv ${fmt(conv,1)}</span>
            <span class="tag">${safe(s.engine)}</span>
            <span class="tag">${safe(s.regime||'—')}</span>
            ${verdictTag(v)}
          </div>
        </div>
        <div style="color:var(--muted);font-size:.88rem">R:R ${fmt(s.rr,2)}</div>
      </div>
      <div class="levels">
        <div class="lvl"><div class="k">Entry</div><div class="v">${fmt(s.entry,4)}</div></div>
        <div class="lvl"><div class="k">Stop</div><div class="v">${fmt(s.sl,4)}</div></div>
        <div class="lvl"><div class="k">Target</div><div class="v">${fmt(s.tp,4)}</div></div>
        <div class="lvl"><div class="k">MTF</div><div class="v">${safe(s.mtf_verdict||s.mtf||'—')}</div></div>
      </div>
      <div class="tags">
        <span class="tag">Prop ${s.prop?'Yes':'No'}</span>
        <span class="tag">${safe(s.intent||'—')}</span>
        <span class="tag">${safe(s.action_state||'—')}</span>
      </div>
      ${btns}
    </div>`;
}

function rtsCard(r) {
  const trap = sf(r.trap_score||r.trap_risk||0);
  const col = trap>=0.75?'var(--danger)':trap>=0.55?'var(--warning)':'var(--success)';
  return `<div class="rts-sig">
    <div class="rts-top">
      <div>
        <h3>${safe(r.pair)}</h3>
        <div class="tags" style="margin-top:6px">
          <span class="tag">${safe(r.engine||r.source||'RTS')}</span>
          ${r.intent?`<span class="tag" style="color:var(--primary)">${safe(r.intent)}</span>`:''}
          ${r.bias?`<span class="tag ${r.bias==='LONG'?'long':'short'}">${r.bias}</span>`:''}
          ${r.action_state?`<span class="tag">${safe(r.action_state)}</span>`:''}
        </div>
      </div>
      <div class="trap-score" style="color:${col}">trap ${fmt(trap,2)}</div>
    </div>
    <div class="tags">
      <span class="tag">Conv ${fmt(sf(r.conviction)*100,1)}</span>
      <span class="tag">Regime ${safe(r.regime||'—')}</span>
    </div>
  </div>`;
}

function gimbaCard(r) {
  const conv = sf(r.conviction)>1?sf(r.conviction):sf(r.conviction)*100;
  return `<div class="gimba-sig">
    <div class="rts-top">
      <div>
        <h3>${safe(r.pair||r.symbol||'GIMBA')}</h3>
        <div class="tags" style="margin-top:6px">
          <span class="tag">${safe(r.engine||r.source||'GIMBA')}</span>
          ${r.bias?`<span class="tag ${r.bias==='LONG'?'long':'short'}">${r.bias}</span>`:''}
          ${r.intent?`<span class="tag" style="color:var(--primary)">${safe(r.intent)}</span>`:''}
        </div>
      </div>
      <div style="font-size:.85rem;color:var(--muted)">Conv ${fmt(conv,1)}</div>
    </div>
    <div class="tags" style="margin-top:8px">
      <span class="tag">Regime ${safe(r.regime||'—')}</span>
      <span class="tag">Action ${safe(r.action_state||'—')}</span>
    </div>
  </div>`;
}

function empty(msg){return `<div class="empty">${msg}</div>`;}

async function loadBus(){
  for(const url of ['/api/signals','./signal_bus.json']){
    try{const r=await fetch(url,{cache:'no-store'});if(r.ok){const d=await r.json();if(d&&typeof d==='object')return d;}}catch(_){}
  }
  return {};
}

async function refresh(){
  const bus = await loadBus();
  const snap = createCanonicalSnapshot(bus,{version:'v1',source:'adapter',environment:bus.environment||'live'});
  const status = snap.health?.status||(snap.signals?'live':'offline');
  setConn(status);
  document.getElementById('statScan').textContent=(snap.session?.last_scan||'—').slice(11,19)||'—';
  document.getElementById('fgScore').textContent=safe(snap.health?.fear_greed?.score);
  document.getElementById('fgLabel').textContent=safe(snap.health?.fear_greed?.label||'');
  const sigs=arr(snap.signals).filter(s=>s.december_verdict!=='EXPIRED');
  document.getElementById('statSigs').textContent=sigs.length;
  document.getElementById('botsCount').textContent=sigs.length;
  document.getElementById('botsBody').innerHTML=sigs.length?sigs.map(sigCard).join(''):empty('No bot signals this cycle.');
  const rts=arr(snap.rts_signals).sort((a,b)=>sf(b.trap_score||b.trap_risk||0)-sf(a.trap_score||a.trap_risk||0));
  document.getElementById('statRts').textContent=rts.length;
  document.getElementById('rtsCount').textContent=rts.length;
  document.getElementById('rtsBody').innerHTML=rts.length?rts.map(rtsCard).join(''):empty('No RTS trap signals this cycle.');
  const gimba=arr(snap.gimba_signals||bus.gimba_signals||[]);
  document.getElementById('gimbaCount').textContent=gimba.length;
  document.getElementById('gimbaBody').innerHTML=gimba.length?gimba.map(gimbaCard).join(''):empty('No GIMBA signals this cycle.');
  const april=snap.audit?.april_view||snap.april_view||bus.april_view||{};
  const mode=april.council_mode||snap.session?.council_mode||'—';
  const mEl=document.getElementById('statMode');
  mEl.textContent=mode;
  mEl.style.color=mode==='STAND_DOWN'?'var(--danger)':mode==='TIME_TO_HUNT'?'var(--gold)':mode==='NORMAL'?'var(--success)':'var(--muted)';
}

window._exec=async(sig,btn)=>{btn.disabled=true;btn.textContent='Sending…';try{const r=await fetch('/api/position/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pair:sig.pair,bias:sig.bias,engine:sig.engine,fired_at:sig.fired_at})});const d=await r.json();if(d.ok){btn.textContent='✓ LIVE';btn.style.background='color-mix(in srgb,var(--success) 25%,transparent)';}else{btn.textContent='Error';btn.disabled=false;}}catch(_){btn.textContent='Error';btn.disabled=false;}};
window._wait=async(pair,btn)=>{btn.disabled=true;btn.textContent='Marking…';try{const r=await fetch('/api/position/wait',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pair})});const d=await r.json();if(d.ok){btn.textContent='Waiting';btn.style.color='#a78bfa';}else{btn.textContent='Error';btn.disabled=false;}}catch(_){btn.textContent='Error';btn.disabled=false;}};
window._rej=async(pair,btn)=>{btn.disabled=true;btn.textContent='Rejecting…';try{const r=await fetch('/api/position/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pair})});const d=await r.json();if(d.ok){btn.closest('.sig').style.opacity='0.4';btn.textContent='Rejected';}else{btn.textContent='Error';btn.disabled=false;}}catch(_){btn.textContent='Error';btn.disabled=false;}};

window.toggleSection=(id)=>{document.getElementById(id+'Body').classList.toggle('hidden');document.getElementById(id+'Chev').classList.toggle('open');};

refresh();
setInterval(refresh,15000);
</script>
</body>
</html>
