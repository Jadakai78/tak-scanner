name: Run Oracle Inspector

on:
  workflow_dispatch:

jobs:
  run-inspector:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run inspector
        run: python oracle_panel_inspector.py
